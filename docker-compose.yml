version: '3.8'

services:
  voicechess-api:
    image: voicechess-ai:latest
    container_name: voicechess-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Uncomment jika mau persist model cache
      # - ./models:/app/.torch
      - /dev/null:/dev/null
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
